<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Moñona</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: gold;
  text-align: center;
}

img {
  width: 130px;
  margin-top: 20px;
}

.stats {
  display: flex;
  justify-content: space-around;
  margin: 15px;
}

.stat {
  background: #111;
  padding: 10px;
  border-radius: 10px;
  width: 30%;
  border: 1px solid gold;
}

#grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 8px;
  padding: 15px;
}

.box {
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  border: 1px solid gold;
}

.disponible {
  background: #111;
  color: gold;
}

.reservado {
  background: linear-gradient(145deg, #fff3b0, #ffd700);
  color: black;
}

.pagado {
  background: #00c853;
  color: white;
}

.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  background: rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#111;
  padding:20px;
  border-radius:15px;
  width:80%;
  border:1px solid gold;
}

input {
  width:90%;
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
}

.confirmar {
  background: gold;
}

.admin {
  background: red;
  color: white;
}
</style>
</head>

<body>

<img src="logo.jpg">
<h1>La Moñona</h1>

<div class="stats">
  <div class="stat">
    <div id="disp">0</div>
    <small>Disponibles</small>
  </div>
  <div class="stat">
    <div id="res">0</div>
    <small>Reservados</small>
  </div>
  <div class="stat">
    <div id="pag">0</div>
    <small>Pagados</small>
  </div>
</div>

<div id="grid"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="titulo"></h3>

    <input id="nombre" placeholder="Nombre">
    <input id="telefono" placeholder="Teléfono">

    <br>
    <button onclick="cerrar()">Cancelar</button>
    <button class="confirmar" onclick="guardar()">Reservar</button>

    <hr>

    <!-- ADMIN OCULTO -->
    <button class="admin" id="btnPagado" onclick="marcarPagado()" style="display:none;">Marcar pagado</button>
    <button class="admin" id="btnLiberar" onclick="liberar()" style="display:none;">Liberar número</button>

  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "la-monona.firebaseapp.com",
  projectId: "la-monona",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let seleccionado = null;
let datosGlobal = {};

const grid = document.getElementById("grid");

db.collection("rifa").onSnapshot(snapshot => {

  grid.innerHTML = "";
  datosGlobal = {};

  snapshot.forEach(doc => datosGlobal[doc.id] = doc.data());

  let reservados = 0;
  let pagados = 0;

  for (let i = 0; i < 100; i++) {
    let num = i.toString().padStart(2, '0');

    let div = document.createElement("div");
    div.classList.add("box");

    if (datosGlobal[num]) {

      if (datosGlobal[num].estado === "pagado") {
        div.classList.add("pagado");
        pagados++;
      } else {
        div.classList.add("reservado");
        reservados++;
      }

      div.innerHTML = num + "<br><small>" + datosGlobal[num].nombre + "</small>";
    } else {
      div.classList.add("disponible");
      div.innerText = num;
    }

    div.onclick = () => {

      if (datosGlobal[num]) return;

      seleccionado = num;
      document.getElementById("modal").style.display = "flex";
      document.getElementById("titulo").innerText = "Número " + num;

      // ADMIN SOLO CON ?admin
      if (window.location.href.includes("admin")) {
        document.getElementById("btnPagado").style.display = "inline-block";
        document.getElementById("btnLiberar").style.display = "inline-block";
      }
    };

    grid.appendChild(div);
  }

  document.getElementById("res").innerText = reservados;
  document.getElementById("pag").innerText = pagados;
  document.getElementById("disp").innerText = 100 - reservados - pagados;
});

function cerrar() {
  document.getElementById("modal").style.display = "none";
}

function guardar() {
  let nombre = document.getElementById("nombre").value;
  let telefono = document.getElementById("telefono").value;

  if (!nombre || !telefono) return alert("Completa todo");

  db.collection("rifa").doc(seleccionado).set({
    nombre,
    telefono,
    estado: "reservado"
  });

  window.open(`https://wa.me/56951888948?text=${encodeURIComponent(
    `Hola, soy ${nombre}. Reservé el número ${seleccionado}`
  )}`);

  document.getElementById("nombre").value = "";
  document.getElementById("telefono").value = "";

  cerrar();
}

function marcarPagado() {
  db.collection("rifa").doc(seleccionado).update({
    estado: "pagado"
  });
  cerrar();
}

function liberar() {
  db.collection("rifa").doc(seleccionado).delete();
  cerrar();
}
</script>

</body>
</html>
