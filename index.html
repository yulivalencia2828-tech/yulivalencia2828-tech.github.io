<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Moñona</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0a1f44, #1e3c72);
  color: gold;
  text-align: center;
}

h1 {
  margin-top: 20px;
  font-size: 28px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 10px;
  padding: 15px;
}

.numero {
  padding: 15px;
  border: 2px solid gold;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
}

.numero.ocupado {
  background: red;
  color: white;
}

.numero.pagado {
  background: green;
  color: white;
}
</style>

</head>
<body>

<h1>La Moñona</h1>

<div class="grid" id="grid"></div>

<script>
let ocupados = JSON.parse(localStorage.getItem("ocupados")) || {};

let grid = document.getElementById("grid");

for (let i = 0; i < 100; i++) {
  let div = document.createElement("div");
  div.className = "numero";
  div.innerText = i.toString().padStart(2, "0");

  if (ocupados[i]) {
    div.classList.add(ocupados[i]);
  }

  div.onclick = () => {
    let estado = ocupados[i];

    if (!estado) {
      ocupados[i] = "ocupado";
    } else if (estado === "ocupado") {
      ocupados[i] = "pagado";
    } else {
      delete ocupados[i];
    }

    localStorage.setItem("ocupados", JSON.stringify(ocupados));
    location.reload();
  };

  grid.appendChild(div);
}
</script>

</body>
</html>
